.err{color:#f04747;font-size:.875rem;margin-top:8px;display:none}

#c .hd p{color:var(--muted);font-size:.875rem;margin-top:2px}
#c .bd{padding:1.5rem 2rem 2rem}
#c .bd .s{margin-bottom:2rem}
#c .bd .s:last-child{margin-bottom:0}
#c .bd h3{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px}
#c .bd p{font-size:.9375rem;margin-bottom:10px}

#c .bd li{margin-bottom:4px}
#c .bd a{color:var(--accent);text-decoration:none}
.code-wrap{position:relative;margin:10px 0}
.code-wrap pre{background:var(--code-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:.8125rem;font-family:'JetBrains Mono','Fira Code','Consolas',monospace;overflow-x:auto;line-height:1.5;color:#c9d1d9;white-space:pre-wrap;word-break:break-all}
.cpy{position:absolute;top:8px;right:8px;background:var(--border);border:none;border-radius:4px;color:var(--muted);padding:4px 10px;font-size:.75rem;cursor:pointer;transition:all .15s;font-family:inherit}
.cpy:hover{background:var(--accent);color:#fff}
.cpy.done{background:#2ea043;color:#fff}
.st{display:flex;gap:12px;margin-bottom:16px;align-items:flex-start}
.st:last-child{margin-bottom:0}
.stn{flex-shrink:0;width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8125rem;font-weight:600;color:#fff;margin-top:1px}
.stb{flex:1;min-width:0}
.stb h4{font-size:.9375rem;font-weight:500;margin-bottom:4px}
.stb p{font-size:.875rem;color:var(--muted)}
#c .ft{padding:1rem 2rem;border-top:1px solid var(--border);font-size:.8125rem;color:var(--muted)}
@media(max-width:480px){.box,#c .hd,#c .bd,#c .ft{padding-left:1.25rem;padding-right:1.25rem}.box{padding:1.5rem}}
</style>
